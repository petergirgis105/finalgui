<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsychologyResearchPool — Database GUI</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --accent: #4f46e5;
    --accent2: #06b6d4;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
    --border: #e5e7eb;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  /* Sidebar */
  aside {
    width: 260px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
  }
  .logo {
    font-size: 1.25rem;
    font-weight: 700;
    padding: 0 24px 24px;
    color: var(--accent);
    letter-spacing: -0.02em;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .nav-item {
    padding: 12px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.95rem;
    transition: background .15s, color .15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: #f3f4f6; }
  .nav-item.active { background: #eef2ff; color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
  .nav-icon { width: 20px; text-align: center; }
  .badge {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
  /* Main */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  h1 { font-size: 1.25rem; font-weight: 600; }
  .toolbar { display: flex; gap: 12px; align-items: center; }
  input[type="text"], input[type="date"], input[type="number"], input[type="email"], select, textarea {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: transform .05s, opacity .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4338ca; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-warning:hover { background: #d97706; }
  .btn-secondary { background: #e5e7eb; color: var(--text); }
  .btn-secondary:hover { background: #d1d5db; }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: #f3f4f6; }

  /* Content */
  .content { flex: 1; overflow: auto; padding: 24px 32px; }
  .card {
    background: var(--card);
    border-radius: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead th {
    background: #f9fafb;
    text-align: left;
    padding: 12px 16px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: #f9fafb; }
  tbody tr:last-child td { border-bottom: none; }
  .actions { display: flex; gap: 6px; }
  .col-id { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 0.8rem; }
  .truncate { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .status-completed { background: #d1fae5; color: #065f46; }
  .status-assigned { background: #dbeafe; color: #1e40af; }
  .status-withdrawn { background: #fee2e2; color: #991b1b; }
  .status-active { background: #d1fae5; color: #065f46; }
  .status-inactive { background: #fee2e2; color: #991b1b; }
  .empty { text-align: center; padding: 48px; color: var(--muted); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 50; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    width: 560px;
    max-width: 90vw;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: modalIn .2s ease-out;
  }
  .modal.wide { width: 640px; }
  @keyframes modalIn { from { opacity:0; transform: translateY(12px) scale(0.98); } to { opacity:1; transform: translateY(0) scale(1); } }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 1.1rem; display:flex; align-items:center; gap:10px; }
  .modal-body { padding: 20px 24px; overflow: auto; font-size:0.95rem; line-height:1.5; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }

  /* Delete confirmation specific */
  .impact-list { background: #f9fafb; border-radius: 8px; padding: 12px 16px; margin: 12px 0; max-height: 200px; overflow: auto; }
  .impact-list li { padding: 4px 0; font-size: 0.88rem; color: var(--text); }
  .impact-list li .meta { color: var(--muted); font-size: 0.8rem; }
  .cascade-toggle { display: flex; align-items: center; gap: 10px; margin-top: 16px; padding: 12px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; }
  .cascade-toggle input { width: 18px; height: 18px; accent-color: var(--warning); }
  .cascade-toggle label { font-weight: 600; color: #92400e; cursor: pointer; font-size: 0.9rem; }

  /* Toast notifications */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }
  .toast {
    background: var(--card);
    border-radius: 10px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 280px;
    max-width: 360px;
    border-left: 4px solid var(--accent);
    animation: toastIn .3s ease-out;
    pointer-events: auto;
    font-size: 0.9rem;
  }
  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--danger); }
  .toast.warning { border-left-color: var(--warning); }
  @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  .toast-close { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; }

  /* Dashboard */
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 24px; }
  .stat {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
  .recent { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 20px; }
  .recent h3 { font-size: 1rem; margin-bottom: 12px; }
  .recent-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .recent-row:last-child { border-bottom: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }

  /* Responsive */
  @media (max-width: 768px) {
    aside { width: 64px; }
    .logo span, .nav-item span, .badge { display: none; }
    .nav-item { justify-content: center; padding: 12px 0; }
    .content { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .modal { width: 95vw; }
  }
</style>
</head>

let currentTable = "dashboard";
let searchTerm = "";
let pendingDelete = null; // {table, id, cascade: bool}

/* ============================
   UTILITIES
   ============================ */
function nextId(table) {
  const arr = db[table];
  const pk = schema[table].pk;
  return arr.length ? Math.max(...arr.map(r=>r[pk])) + 1 : 1;
}
function fmtDate(d) { return d ? new Date(d).toLocaleDateString() : "—"; }
function fmtBool(v) { return v ? "Yes" : "No"; }
function statusBadge(status) {
  const cls = status === "Completed" ? "status-completed" : status === "Assigned" ? "status-assigned" : "status-withdrawn";
  return `<span class="status ${cls}">${status}</span>`;
}
function activeBadge(v) {
  const cls = v ? "status-active" : "status-inactive";
  return `<span class="status ${cls}">${v ? "Active" : "Inactive"}</span>`;
}
function getRef(table, id, labelField) {
  const row = db[table].find(r => r[schema[table].pk] == id);
  return row ? (row[labelField] || row[schema[table].pk]) : `ID ${id}`;
}

/* ============================
   TOAST SYSTEM
   ============================ */
function toast(message, type="info", duration=3000) {
  const container = document.getElementById("toast-container");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icon = type==="success"?"✅":type==="error"?"❌":type==="warning"?"⚠️":"ℹ️";
  el.innerHTML = `<span>${icon} ${message}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

/* ============================
   RENDERING
   ============================ */
function render() {
  updateBadges();
  if (currentTable === "dashboard") { renderDashboard(); return; }
  document.getElementById("page-title").textContent = currentTable.replace(/_/g, " ");
  document.getElementById("btn-add").style.display = "inline-flex";
  const container = document.getElementById("content");
  const rows = filterRows(db[currentTable]);
  const cols = Object.keys(db[currentTable][0] || {});
  if (!cols.length) { container.innerHTML = `<div class="empty">No records found.</div>`; return; }

  let html = `<div class="card"><table><thead><tr>`;
  cols.forEach(c => html += `<th>${c.replace(/_/g," ")}</th>`);
  html += `<th style="width:1px">Actions</th></tr></thead><tbody>`;
  rows.forEach(row => {
    html += `<tr>`;
    cols.forEach(c => {
      let val = row[c];
      if (c.endsWith("_id") && c !== schema[currentTable].pk) {
        const meta = schema[currentTable].fields.find(f => f.name === c);
        if (meta && meta.ref) val = `${getRef(meta.ref, val, meta.refLabel)} <span class="col-id">(${val})</span>`;
      }
      if (c === schema[currentTable].pk) html += `<td class="col-id">${val}</td>`;
      else if (c === "completion_status") html += `<td>${statusBadge(val)}</td>`;
      else if (c === "is_active") html += `<td>${activeBadge(val)}</td>`;
      else if (c === "is_double_blind") html += `<td>${fmtBool(val)}</td>`;
      else if (c.includes("date")) html += `<td>${fmtDate(val)}</td>`;
      else if (c === "description") html += `<td><div class="truncate" title="${val||""}">${val||"—"}</div></td>`;
      else html += `<td>${val !== null && val !== undefined ? val : "—"}</td>`;
    });
    const pk = schema[currentTable].pk;
    html += `<td><div class="actions"><button class="btn btn-danger btn-sm" onclick="promptDelete(${row[pk]})">Delete</button></div></td></tr>`;
  });
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

function filterRows(rows) {
  if (!searchTerm) return rows;
  const term = searchTerm.toLowerCase();
  return rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(term)));
}

function updateBadges() {
  Object.keys(db).forEach(t => {
    const el = document.getElementById(`badge-${t}`);
    if (el) el.textContent = db[t].length;
  });
}

function renderDashboard() {
  document.getElementById("page-title").textContent = "Dashboard";
  document.getElementById("btn-add").style.display = "none";
  const totalParticipants = db.Participants.length;
  const totalStudies = db.Studies.length;
  const totalAssignments = db.Assignments.length;
  const totalCredits = db.Credit_Hours_Log.reduce((s,r)=>s+r.hours_awarded,0);
  const completedAssignments = db.Assignments.filter(a=>a.completion_status==="Completed").length;
  const activeParticipants = db.Participants.filter(p=>p.is_active).length;

  let html = `
    <div class="dash-grid">
      <div class="stat"><div class="stat-value">${totalParticipants}</div><div class="stat-label">Total Participants</div></div>
      <div class="stat"><div class="stat-value">${activeParticipants}</div><div class="stat-label">Active Participants</div></div>
      <div class="stat"><div class="stat-value">${totalStudies}</div><div class="stat-label">Studies</div></div>
      <div class="stat"><div class="stat-value">${totalAssignments}</div><div class="stat-label">Assignments</div></div>
      <div class="stat"><div class="stat-value">${completedAssignments}</div><div class="stat-label">Completed Assignments</div></div>
      <div class="stat"><div class="stat-value">${totalCredits.toFixed(2)}</div><div class="stat-label">Total Credit Hours Awarded</div></div>
    </div>
    <div class="recent">
      <h3>📝 Recent Assignments</h3>
      ${db.Assignments.slice(-8).reverse().map(a => {
        const p = db.Participants.find(x=>x.participant_id===a.participant_id);
        const s = db.Studies.find(x=>x.study_id===a.study_id);
        return `<div class="recent-row"><span>${p ? p.first_name+" "+p.last_name : "Participant "+a.participant_id} → ${s ? s.study_name : "Study "+a.study_id}</span><span>${statusBadge(a.completion_status)}</span></div>`;
      }).join("")}
    </div>
    <div class="recent" style="margin-top:20px">
      <h3>⏱️ Top Credit Hours by Participant</h3>
      ${Object.entries(db.Credit_Hours_Log.reduce((acc,cur)=>{
        const a = db.Assignments.find(x=>x.assignment_id===cur.assignment_id);
        const pid = a ? a.participant_id : 0;
        acc[pid] = (acc[pid]||0) + cur.hours_awarded;
        return acc;
      },{})).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([pid,hours])=>{
        const p = db.Participants.find(x=>x.participant_id==pid);
        return `<div class="recent-row"><span>${p ? p.first_name+" "+p.last_name : "Participant "+pid}</span><span><b>${hours.toFixed(2)} hrs</b></span></div>`;
      }).join("")}
    </div>
  `;
  document.getElementById("content").innerHTML = html;
}

/* ============================
   ADD RECORD
   ============================ */
function openAddModal() {
  if (currentTable === "dashboard") return;
  const meta = schema[currentTable];
  document.getElementById("modal-title").textContent = `Add ${currentTable.replace(/_/g," ")}`;
  let html = `<div class="form-grid">`;
  meta.fields.forEach(f => {
    const required = f.required ? " required" : "";
    let input = "";
    if (f.type === "select") {
      input = `<select id="field-${f.name}"${required}>`;
      if (!f.required) input += `<option value="">— Select —</option>`;
      f.options.forEach(opt => {
        if (typeof opt === "object") input += `<option value="${opt.value}">${opt.label}</option>`;
        else input += `<option value="${opt}">${opt}</option>`;
      });
      input += `</select>`;
    } else if (f.type === "textarea") {
      input = `<textarea id="field-${f.name}" rows="3"${required}></textarea>`;
    } else if (f.ref) {
      input = `<select id="field-${f.name}"${required}>`;
      if (!f.required) input += `<option value="">— Select —</option>`;
      db[f.ref].forEach(r => {
        const val = r[schema[f.ref].pk];
        const label = r[f.refLabel] || val;
        input += `<option value="${val}">${label} (${val})</option>`;
      });
      input += `</select>`;
    } else {
      input = `<input type="${f.type}" id="field-${f.name}"${f.step?` step="${f.step}"`:""}${required}>`;
    }
    html += `
      <div class="field ${f.type==="textarea"?"full":""}">
        <label>${f.name.replace(/_/g," ")}${f.required?" *":""}</label>
        ${input}
      </div>
    `;
  });
  html += `</div>`;
  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

function submitAdd() {
  const meta = schema[currentTable];
  const row = {};
  if (meta.auto) row[meta.pk] = nextId(currentTable);
  for (const f of meta.fields) {
    const el = document.getElementById(`field-${f.name}`);
    let val = el.value;
    if (f.required && !val && val !== false) { toast(`${f.name} is required.`, "error"); return; }
    if (f.type === "number") val = val === "" ? null : parseFloat(val);
    if (f.type === "select" && f.options && f.options.length && typeof f.options[0] === "object" && (f.options[0].value === true || f.options[0].value === false)) {
      val = val === "true" ? true : val === "false" ? false : val;
    }
    row[f.name] = val;
  }
  db[currentTable].push(row);
  saveToStorage();
  closeModal();
  toast("Record added successfully!", "success");
  render();
}

/* ============================
   DELETE WITH CASCADE OPTION
   ============================ */
function promptDelete(id) {
  const meta = schema[currentTable];
  const pk = meta.pk;
  const row = db[currentTable].find(r => r[pk] == id);
  if (!row) return;

  // Find all referencing records
  const impacts = [];
  Object.keys(schema).forEach(t => {
    if (t === currentTable) return;
    schema[t].fields.forEach(f => {
      if (f.ref === currentTable) {
        const refs = db[t].filter(r => r[f.name] == id);
        refs.forEach(r => {
          const label = f.refLabel ? r[f.refLabel] : r[schema[t].pk];
          impacts.push({ table: t, id: r[schema[t].pk], label: label || `ID ${r[schema[t].pk]}` });
        });
      }
    });
  });

  pendingDelete = { table: currentTable, id, impacts };

  let bodyHtml = `<p>You are about to delete <b>${currentTable.replace(/_/g," ")}</b> record <b>#${id}</b>.</p>`;

  if (impacts.length) {
    bodyHtml += `<p style="margin-top:10px; color:var(--danger); font-weight:600;">⚠️ This record is referenced by ${impacts.length} other record(s):</p>`;
    bodyHtml += `<ul class="impact-list">`;
    impacts.forEach(imp => {
      bodyHtml += `<li><b>${imp.table.replace(/_/g," ")}</b> — ${imp.label} <span class="meta">(ID ${imp.id})</span></li>`;
    });
    bodyHtml += `</ul>`;
    bodyHtml += `
      <div class="cascade-toggle">
        <input type="checkbox" id="cascade-check">
        <label for="cascade-check">Cascade delete — also remove all dependent records above</label>
      </div>
    `;
  } else {
    bodyHtml += `<p style="margin-top:10px; color:var(--success);">✅ No other records reference this. Safe to delete.</p>`;
  }

  document.getElementById("delete-body").innerHTML = bodyHtml;
  document.getElementById("btn-delete-confirm").textContent = impacts.length ? "Delete with Cascade" : "Confirm Delete";
  document.getElementById("delete-overlay").classList.add("open");
}

function closeDeleteModal() {
  document.getElementById("delete-overlay").classList.remove("open");
  pendingDelete = null;
}

function confirmDelete() {
  if (!pendingDelete) return;
  const { table, id, impacts } = pendingDelete;
  const cascade = document.getElementById("cascade-check")?.checked || false;
  const meta = schema[table];

  if (impacts.length && !cascade) {
    toast("Deletion blocked: dependent records exist. Enable cascade to force delete.", "warning", 4000);
    closeDeleteModal();
    return;
  }

  // Perform cascade: delete children first (bottom-up to avoid missing refs)
  if (cascade && impacts.length) {
    // Group by table and delete
    const byTable = {};
    impacts.forEach(imp => { byTable[imp.table] = byTable[imp.table] || []; byTable[imp.table].push(imp.id); });
    // Sort tables by dependency depth (Credit_Hours_Log depends on Assignments, etc.)
    const order = ["Credit_Hours_Log", "Assignments", "Studies", "Ethics_Approvals", "Researchers", "Participants"];
    const sortedTables = Object.keys(byTable).sort((a,b) => order.indexOf(a) - order.indexOf(b));
    sortedTables.forEach(t => {
      const pk = schema[t].pk;
      db[t] = db[t].filter(r => !byTable[t].includes(r[pk]));
    });
  }

  // Delete the main record
  db[table] = db[table].filter(r => r[meta.pk] != id);
  saveToStorage();

  toast(`Deleted ${table.replace(/_/g," ")} #${id}${cascade ? " and dependents" : ""}.`, "success");
  closeDeleteModal();
  render();
}

// Close modals on overlay click
document.getElementById("modal-overlay").addEventListener("click", e => { if (e.target.id === "modal-overlay") closeModal(); });
document.getElementById("delete-overlay").addEventListener("click", e => { if (e.target.id === "delete-overlay") closeDeleteModal(); });

// Persistence helpers
const STORAGE_KEY = 'psych_pool_db_v1';
function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); showSaveStatus(); } catch(e) { console.warn('Storage failed', e); }
}
function showSaveStatus() {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}
function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.keys(db).forEach(k => { if (parsed[k]) db[k] = parsed[k]; });
      return true;
    }
  } catch(e) { console.warn('Load failed', e); }
  return false;
}
function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'psychology_research_pool_data.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Database exported!', 'success');
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        Object.keys(db).forEach(k => { if (parsed[k]) db[k] = parsed[k]; });
        saveToStorage();
        render();
        toast('Database imported successfully!', 'success');
      } catch(err) { toast('Invalid JSON file.', 'error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}
function resetData() {
  if (!confirm('Reset ALL data to original seed values? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// Load saved data if available
if (loadFromStorage()) {
  toast('Loaded saved data from browser storage.', 'success', 2000);
}

// Initial render
render();
if (loadFromStorage()) showSaveStatus();
</script>
